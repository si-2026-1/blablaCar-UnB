name: Bug
description: Registrar problema encontrado
title: "[Bug] "
labels:
  - "tipo:bug"
body:
  - type: textarea
    id: descricao
    attributes:
      label: Descricao do problema
      placeholder: O que esta acontecendo?
    validations:
      required: true

  - type: textarea
    id: passos
    attributes:
      label: Passos para reproduzir
      placeholder: |
        1. ...
        2. ...
        3. ...
    validations:
      required: true

  - type: textarea
    id: esperado
    attributes:
      label: Comportamento esperado
      placeholder: O que deveria acontecer?
    validations:
      required: true

  - type: textarea
    id: evidencias
    attributes:
      label: Evidencias, se houver
      description: Links, prints ou logs que ajudem no diagnostico.
    validations:
      required: false

  - type: textarea
    id: impacto
    attributes:
      label: Impacto para usuarios
      placeholder: Quem e afetado e qual o impacto?
    validations:
      required: true
